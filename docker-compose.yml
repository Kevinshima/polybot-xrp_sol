version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "${DASHBOARD_PORT:-8083}:8083"
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/pnl"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  redis-data:
  bot-data:
  bot-logs:
